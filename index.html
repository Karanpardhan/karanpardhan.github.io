<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan Portfolio</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  font-family: Arial, sans-serif;
  color: white;
}

/* SECTION TITLES */
h2 {
  text-align: center;
  margin-top: 60px;
  font-size: 32px;
}

/* SHORT VIDEOS GRID */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 40px;
}

.video-grid iframe {
  width: 100%;
  aspect-ratio: 9 / 16;
  border-radius: 18px;
  border: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  transition: 0.3s;
}

.video-grid iframe:hover {
  transform: scale(1.05);
}

/* LONG VIDEOS */
.video-wide {
  display: grid;
  gap: 40px;
  padding: 40px;
}

.video-wide iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 18px;
  border: none;
  box-shadow: 0 10px 40px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<h2>Short Form Edits</h2>

<div class="video-grid">

<iframe src="https://www.youtube.com/embed/b_pDpjoYcJ0?autoplay=1&mute=1&loop=1&playlist=b_pDpjoYcJ0&controls=0&playsinline=1" allow="autoplay; fullscreen"></iframe>

<iframe src="https://www.youtube.com/embed/a1WAUWAIKRg?autoplay=1&mute=1&loop=1&playlist=a1WAUWAIKRg&controls=0&playsinline=1" allow="autoplay; fullscreen"></iframe>

<iframe src="https://www.youtube.com/embed/xDd5u5Z4IEM?autoplay=1&mute=1&loop=1&playlist=xDd5u5Z4IEM&controls=0&playsinline=1" allow="autoplay; fullscreen"></iframe>

<iframe src="https://www.youtube.com/embed/HhQcV_dZxho?autoplay=1&mute=1&loop=1&playlist=HhQcV_dZxho&controls=0&playsinline=1" allow="autoplay; fullscreen"></iframe>

</div>
