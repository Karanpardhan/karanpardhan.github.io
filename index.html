<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan | Video Editor</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  font-family: Arial, sans-serif;
  color: white;
}

/* HEADINGS */
h2 {
  text-align: center;
  margin: 60px 0 20px;
  font-size: 32px;
}

/* SHORT VIDEOS */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 40px;
}

.video-grid iframe {
  width: 100%;
  aspect-ratio: 9 / 16;
  border-radius: 18px;
  border: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  transition: 0.3s;
}

.video-grid iframe:hover {
  transform: scale(1.05);
}

/* LONG VIDEOS FIXED (REAL 16:9) */
.video-wide {
  display: grid;
  gap: 40px;
  padding: 40px;
}

/* 🔥 BULLETPROOF RATIO FIX */
.video-box {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: auto;
  padding-top: 56.25%; /* 16:9 */
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.7);
}

.video-box iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<h2>Short Form Edits</h2>

<div class="video-grid">

<iframe src="https://www.youtube.com/embed/b_pDpjoYcJ0?autoplay=1&mute=1&loop=1&playlist=b_pDpjoYcJ0&controls=0&playsinline=1" allow="autoplay"></iframe>

<iframe src="https://www.youtube.com/embed/a1WAUWAIKRg?autoplay=1&mute=1&loop=1&playlist=a1WAUWAIKRg&controls=0&playsinline=1" allow="autoplay"></iframe>

<iframe src="https://www.youtube.com/embed/_qPAUtNM64I?autoplay=1&mute=1&loop=1&playlist=_qPAUtNM64I&controls=0&playsinline=1" allow="autoplay"></iframe>

<iframe src="https://www.youtube.com/embed/xDd5u5Z4IEM?autoplay=1&mute=1&loop=1&playlist=xDd5u5Z4IEM&controls=0&playsinline=1" allow="autoplay"></iframe>

<iframe src="https://www.youtube.com/embed/V2lQMERPq08?autoplay=1&mute=1&loop=1&playlist=V2lQMERPq08&controls=0&playsinline=1" allow="autoplay"></iframe>

</div>


<h2>Long Form Videos</h2>

<div class="video-wide">

<div class="video-box">
<iframe src="https://www.youtube.com/embed/RppgFRilXs0?mute=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<div class="video-box">
<iframe src="https://www.youtube.com/embed/2uyXJBt7eKE?mute=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<div class="video-box">
<iframe src="https://www.youtube.com/embed/xzxGdUDX1vA?mute=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

</div>

</body>
</html>
