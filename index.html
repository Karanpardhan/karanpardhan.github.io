<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan | Video Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0b0b;
  --text: #ffffff;
  --muted: #a1a1a1;
  --line: rgba(255,255,255,0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid var(--line);
}

.logo {
  font-weight: 800;
  font-size: 1.2rem;
}

nav {
  display: flex;
  gap: 20px;
  color: var(--muted);
}

/* SECTION */
.section {
  padding: 60px 40px;
  max-width: 1200px;
  margin: auto;
}

.section h2 {
  font-size: 2.2rem;
  margin-bottom: 30px;
}

/* VIDEO GRID */
.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.long-grid {
  grid-template-columns: repeat(2, 1fr);
}

/* VIDEO CARD */
.video-card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--line);
  transition: 0.3s ease;
  background: #000;
}

.video-card:hover {
  transform: translateY(-6px) scale(1.02);
}

/* VIDEO */
.video-card iframe {
  width: 100%;
  aspect-ratio: 9/16;
  border: none;
}

/* LONG FORM */
.long-grid .video-card iframe {
  aspect-ratio: 16/9;
}

/* OVERLAY */
.video-overlay {
  position: absolute;
  bottom: 10px;
  left: 10px;
  padding: 6px 12px;
  font-size: 0.8rem;
  border-radius: 999px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
}

/* GRADIENT */
.video-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .video-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .video-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">Karan.</div>
  <nav>
    <span>Work</span>
    <span>About</span>
    <span>Contact</span>
  </nav>
</header>

<!-- SHORT FORM -->
<section class="section">
  <h2>Short Form Edits</h2>

  <div class="video-grid">

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/b_pDpjoYcJ0?mute=1&loop=1&playlist=b_pDpjoYcJ0"></iframe>
      <div class="video-overlay">3D Style</div>
    </div>

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/a1WAUWAIKRg?mute=1&loop=1&playlist=a1WAUWAIKRg"></iframe>
      <div class="video-overlay">Documentary</div>
    </div>

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/_qPAUtNM64I?mute=1&loop=1&playlist=_qPAUtNM64I"></iframe>
      <div class="video-overlay">Engaging</div>
    </div>

  </div>
</section>

<!-- LONG FORM -->
<section class="section">
  <h2>Long Form Videos</h2>

  <div class="video-grid long-grid">

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/RppgFRilXs0"></iframe>
      <div class="video-overlay">Documentary</div>
    </div>

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/xzxGdUDX1vA"></iframe>
      <div class="video-overlay">AI Documentary</div>
    </div>

  </div>
</section>

</body>
</html>
